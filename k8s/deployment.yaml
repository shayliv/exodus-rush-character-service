apiVersion: apps/v1
kind: Deployment
metadata:
  name: character-service
  namespace: passover
  labels:
    app: character-service
    component: game-logic
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: character-service
  template:
    metadata:
      labels:
        app: character-service
        component: game-logic
        tier: backend
    spec:
      containers:
      - name: character-service
        image: stealthymcstelath/exodus-rush-character-service:latest
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8081"
        - name: DB_HOST
          value: "postgres-db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: username
              optional: true
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
              optional: true
        - name: DB_NAME
          value: "exodus_characters"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      restartPolicy: Always
