apiVersion: v1
kind: Service
metadata:
  name: character-service
  namespace: passover
  labels:
    app: character-service
    component: game-logic
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: character-service
  sessionAffinity: None
